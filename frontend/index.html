<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificação de Feijão</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="hero">
      <p class="eyebrow">MVP • Qualidade de Software</p>
      <h1>Classificação de Variedades de Feijão</h1>
      <p class="subtitle">
        Preencha as características físicas do grão para obter a previsão da variedade pelo modelo de machine learning.
      </p>
    </header>

    <section class="example-box">
      <h2>Exemplos prontos</h2>
      <p class="example-text">Clique em um exemplo para preencher automaticamente o formulário.</p>
      <div class="example-buttons">
        <button type="button" class="example-button" data-example="SEKER">Exemplo SEKER</button>
        <button type="button" class="example-button" data-example="HOROZ">Exemplo HOROZ</button>
        <button type="button" class="example-button" data-example="CALI">Exemplo CALI</button>
        <button type="button" class="example-button" data-example="BOMBAY">Exemplo BOMBAY</button>
      </div>
    </section>

    <form id="prediction-form" class="form-card">
      <section class="form-section">
        <h2>Medidas principais</h2>
        <div class="form-grid">
          <label>
            Área
            <input id="Area" type="number" step="any" name="Area" value="28395" required>
          </label>

          <label>
            Perímetro
            <input id="Perimeter" type="number" step="any" name="Perimeter" value="610.291" required>
          </label>
